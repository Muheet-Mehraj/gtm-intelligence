<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>GTM Intelligence architecture diagram</title>
<desc>Multi-agent pipeline showing Frontend, FastAPI backend, Memory layer, Orchestrator, five agents (Planner, Retrieval, Enrichment, Critic, GTM Strategy), and supporting layers including External tools, Observability, and ICP Scoring Engine. A coral dashed retry loop connects Critic back to Planner.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .th { font-size: 14px; font-weight: 500; fill: #1a1a1a; }
    .ts { font-size: 12px; font-weight: 400; fill: #555550; }
    .teal-box  { fill: #E1F5EE; stroke: #0F6E56; }
    .gray-box  { fill: #F1EFE8; stroke: #5F5E5A; }
    .amber-box { fill: #FAEEDA; stroke: #854F0B; }
    .purple-box { fill: #EEEDFE; stroke: #534AB7; }
    .red-box   { fill: #FCEBEB; stroke: #A32D2D; }
    .th-teal   { font-size: 14px; font-weight: 500; fill: #085041; }
    .th-gray   { font-size: 14px; font-weight: 500; fill: #444441; }
    .th-amber  { font-size: 14px; font-weight: 500; fill: #633806; }
    .th-purple { font-size: 14px; font-weight: 500; fill: #3C3489; }
    .th-red    { font-size: 14px; font-weight: 500; fill: #791F1F; }
    .ts-teal   { font-size: 12px; fill: #0F6E56; }
    .ts-gray   { font-size: 12px; fill: #5F5E5A; }
    .ts-amber  { font-size: 12px; fill: #854F0B; }
    .ts-purple { font-size: 12px; fill: #534AB7; }
    .ts-red    { font-size: 12px; fill: #A32D2D; }
  </style>
</defs>

<!-- ROW 1: Frontend | FastAPI | Memory -->
<rect class="purple-box" x="40" y="40" width="170" height="66" rx="8" stroke-width="0.5"/>
<text class="th-purple" x="125" y="70" text-anchor="middle">Frontend (React)</text>
<text class="ts-purple" x="125" y="88" text-anchor="middle">Query input · WS stream</text>

<rect class="gray-box" x="245" y="40" width="190" height="66" rx="8" stroke-width="0.5"/>
<text class="th-gray" x="340" y="70" text-anchor="middle">FastAPI backend</text>
<text class="ts-gray" x="340" y="88" text-anchor="middle">POST /run · WS /stream · rate limit</text>

<rect class="amber-box" x="470" y="40" width="170" height="66" rx="8" stroke-width="0.5"/>
<text class="th-amber" x="555" y="70" text-anchor="middle">Memory layer</text>
<text class="ts-amber" x="555" y="88" text-anchor="middle">Session cache · vector store</text>

<!-- Row 1 connectors -->
<line x1="210" y1="73" x2="243" y2="73" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="435" y1="73" x2="468" y2="73" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- ROW 2: Orchestrator -->
<rect class="gray-box" x="220" y="154" width="240" height="56" rx="8" stroke-width="0.5"/>
<text class="th-gray" x="340" y="179" text-anchor="middle">Orchestrator</text>
<text class="ts-gray" x="340" y="197" text-anchor="middle">runner.py · state.py</text>

<!-- FastAPI → Orchestrator -->
<line x1="340" y1="106" x2="340" y2="152" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- ROW 3: 5 Agents -->
<rect class="teal-box" x="40" y="262" width="112" height="66" rx="8" stroke-width="0.5"/>
<text class="th-teal" x="96" y="288" text-anchor="middle">Planner</text>
<text class="ts-teal" x="96" y="308" text-anchor="middle">query → plan</text>

<rect class="teal-box" x="168" y="262" width="112" height="66" rx="8" stroke-width="0.5"/>
<text class="th-teal" x="224" y="288" text-anchor="middle">Retrieval</text>
<text class="ts-teal" x="224" y="308" text-anchor="middle">plan → candidates</text>

<rect class="teal-box" x="296" y="262" width="112" height="66" rx="8" stroke-width="0.5"/>
<text class="th-teal" x="352" y="288" text-anchor="middle">Enrichment</text>
<text class="ts-teal" x="352" y="308" text-anchor="middle">signals · scoring</text>

<rect class="red-box" x="424" y="262" width="112" height="66" rx="8" stroke-width="1"/>
<text class="th-red" x="480" y="288" text-anchor="middle">Critic</text>
<text class="ts-red" x="480" y="308" text-anchor="middle">validate · retry · fail</text>

<rect class="teal-box" x="552" y="262" width="112" height="66" rx="8" stroke-width="0.5"/>
<text class="th-teal" x="608" y="288" text-anchor="middle">GTM strategy</text>
<text class="ts-teal" x="608" y="308" text-anchor="middle">hooks · ICP · email</text>

<!-- Orchestrator → Agents (fan out) -->
<line x1="280" y1="210" x2="96" y2="260" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="310" y1="210" x2="224" y2="260" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="210" x2="352" y2="260" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="370" y1="210" x2="480" y2="260" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="400" y1="210" x2="608" y2="260" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Agent pipeline arrows (horizontal) -->
<line x1="152" y1="295" x2="166" y2="295" stroke="#1D9E75" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="280" y1="295" x2="294" y2="295" stroke="#1D9E75" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="408" y1="295" x2="422" y2="295" stroke="#1D9E75" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="536" y1="295" x2="550" y2="295" stroke="#1D9E75" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- RETRY LOOP: Critic → down → across → up → Planner -->
<path d="M480 328 L480 378 L96 378 L96 330" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text class="ts" x="288" y="394" text-anchor="middle" fill="#993C1D" style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:12px;">critic feedback → planner re-plans (max 3 retries)</text>

<!-- ROW 4: Supporting layers -->
<rect class="gray-box" x="40" y="430" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th-gray" x="130" y="455" text-anchor="middle">External tools</text>
<text class="ts-gray" x="130" y="473" text-anchor="middle">Explorium · Apollo (mocked)</text>

<rect class="gray-box" x="250" y="430" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th-gray" x="340" y="455" text-anchor="middle">Observability</text>
<text class="ts-gray" x="340" y="473" text-anchor="middle">traces · spans · logs</text>

<rect class="gray-box" x="460" y="430" width="180" height="56" rx="8" stroke-width="0.5"/>
<text class="th-gray" x="550" y="455" text-anchor="middle">ICP scoring engine</text>
<text class="ts-gray" x="550" y="473" text-anchor="middle">fit · intent · growth signals</text>

<!-- Supporting layer connectors -->
<line x1="200" y1="328" x2="130" y2="428" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="352" y1="328" x2="340" y2="428" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<line x1="408" y1="328" x2="500" y2="428" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- Output banner -->
<rect x="40" y="524" width="600" height="44" rx="8" fill="none" stroke="#B4B2A9" stroke-width="0.5"/>
<text class="ts-gray" x="340" y="550" text-anchor="middle">Output: plan · results · signals · gtm_strategy · confidence · reasoning_trace</text>

<!-- Legend -->
<line x1="40" y1="592" x2="72" y2="592" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)"/>
<text class="ts-gray" x="78" y="596">Pipeline flow</text>
<line x1="200" y1="592" x2="232" y2="592" stroke="#D85A30" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
<text class="ts-gray" x="238" y="596">Critic retry loop</text>
<line x1="380" y1="592" x2="412" y2="592" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text class="ts-gray" x="418" y="596">Supporting layer</text>
</svg>
